services:
  postgres:
    image: postgres:15.15-trixie
    container_name: jobqueue-postgres
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpass
      POSTGRES_DB: jobqueue
    ports:
      - "5432:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d
  
  redis:
    image: redis:trixie
    ports:
      - "6379:6379"